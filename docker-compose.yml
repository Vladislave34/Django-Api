version: "3.9"

networks:
  django_net:
    driver: bridge

services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${VOLUME_POSTGRES}
    networks:
      - django_net

  api:
    image: v1dkos/django-api-p32:latest
    container_name: django-api-p32
    restart: always
    ports:
      - "4512:8000"
    environment:
      DB_HOST: db
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_PORT: 5432
    volumes:
      - ${VOLUME_API}
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      - db
    networks:
      - django_net

  front:
    image: v1dkos/django-frontend:latest
    container_name: react_front
    restart: always
    ports:
      - "4518:80"
    depends_on:
      - api
    networks:
      - django_net

volumes:
  postgres_data:
  api_data: